<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KPayment Web Sample</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: #f5f5f5;
            width: 100%;
            height: 100vh;
        }
        #ComposeTarget {
            width: 100%;
            height: 100vh;
        }
        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-size: 18px;
            color: #666;
        }
        /* Apple Pay SDK button styling via CSS custom properties.
           These control the shadow DOM's internal button dimensions. */
        apple-pay-button {
            --apple-pay-button-width: 100%;
            --apple-pay-button-height: 48px;
            --apple-pay-button-border-radius: 8px;
            --apple-pay-button-padding: 0px 0px;
            --apple-pay-button-box-sizing: border-box;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="ComposeTarget"></canvas>
    <div class="loading" id="loading">
        Loading KPayment Sample...
    </div>
    <script>
        window.addEventListener('load', function() {
            setTimeout(function() {
                var el = document.getElementById('loading');
                if (el) el.style.display = 'none';
            }, 1000);
        });
    </script>
    <script src="kpayment-sample-web.js"></script>
</body>
</html>
